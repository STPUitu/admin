<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dashboard Tempahan STPU - ITU</title>

<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">

<meta name="theme-color" content="#135c2d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="STPU ITU">
<meta name="mobile-web-app-capable" content="yes">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  #loadingScreen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0d3d20 0%, #1a7a3c 60%, #135c2d 100%);
    z-index: 10;
    transition: opacity .3s ease;
  }
  #loadingScreen.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .box {
    background: #fff;
    border-radius: 18px;
    padding: 40px 32px;
    max-width: 340px;
    width: 90%;
    text-align: center;
    box-shadow: 0 24px 80px rgba(0,0,0,.35);
  }
  .logo {
    width: 88px;
    height: 88px;
    border-radius: 18px;
    margin: 0 auto 16px;
    display: block;
    box-shadow: 0 4px 16px rgba(0,0,0,.15);
  }
  h1 {
    font-size: 16px;
    font-weight: 800;
    color: #135c2d;
    margin-bottom: 16px;
    line-height: 1.4;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 4px solid #e5e7eb;
    border-top-color: #1a7a3c;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p {
    font-size: 12px;
    color: #6b7280;
    line-height: 1.6;
  }
  #appFrame {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
</style>
</head>
<body>
  <div id="loadingScreen">
    <div class="box">
      <img class="logo" src="./icon-192.png" alt="Logo STPU">
      <h1>Dashboard Tempahan<br>Sistem Tempahan Produk Unggas</h1>
      <div class="spinner"></div>
      <p>Memuatkan dashboard...<br>Loading dashboard...</p>
    </div>
  </div>

  <iframe
    id="appFrame"
    allow="clipboard-write"
  ></iframe>

  <script>
    var DASHBOARD_URL = 'https://script.google.com/macros/s/AKfycbxbA0IJES5WPVo-U7u5rUuTCleHzwIPYejDfwxpJ9cnDQsgpekSRKETtfDqkDnVjZJSDA/exec';

    var isMobile = /Android|iPhone|iPod|Mobile/i.test(navigator.userAgent) ||
               (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    if (isMobile) {
      // Mobile: redirect terus (iframe GAS sering diblock di mobile browser)
      window.location.href = DASHBOARD_URL;
    } else {
      // Desktop: load dalam iframe, URL kekal pendek
      var frame = document.getElementById('appFrame');
      var loading = document.getElementById('loadingScreen');

      frame.addEventListener('load', function () {
        setTimeout(function () {
          loading.classList.add('hidden');
        }, 300);
      });

      setTimeout(function () {
        loading.classList.add('hidden');
      }, 6000);

      frame.src = DASHBOARD_URL;
    }
  </script>
</body>
</html>
